<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <style>
      @keyframes slideYellow {
        0% { offset-distance: 0%; }
        100% { offset-distance: 100%; }
      }
      
      @keyframes slidePeach {
        0% { offset-distance: 100%; }
        100% { offset-distance: 0%; }
      }
      
      .yellow-node {
        animation: slideYellow 4s linear infinite;
      }
      
      .peach-node {
        animation: slidePeach 4s linear infinite;
      }
    </style>
    
    <!-- Right arc path for yellow node animation -->
    <path id="rightArcPath" d="M 406.2 179.9 A 166 166 0 0 1 301.6 406.2" fill="none"/>
    
    <!-- Left arc path for peach node animation -->
    <path id="leftArcPath" d="M 105.8 406.2 A 166 166 0 0 1 210.4 179.9" fill="none"/>
  </defs>
  
  <!-- TOP ARC (55°, centered at 12 o'clock) -->
  <path d="M 210.4 105.8 A 166 166 0 0 1 301.6 105.8"
        fill="none" stroke="#E10E0E" stroke-width="28" stroke-linecap="round"/>
  
  <!-- RIGHT ARC (70°, centered at 3 o'clock) -->
  <path d="M 406.2 179.9 A 166 166 0 0 1 301.6 406.2"
        fill="none" stroke="#E10E0E" stroke-width="28" stroke-linecap="round"/>
  
  <!-- BOTTOM ARC (55°, centered at 6 o'clock) -->
  <path d="M 301.6 406.2 A 166 166 0 0 1 210.4 406.2"
        fill="none" stroke="#E10E0E" stroke-width="28" stroke-linecap="round"/>
  
  <!-- LEFT ARC (70°, centered at 9 o'clock) -->
  <path d="M 105.8 406.2 A 166 166 0 0 1 210.4 179.9"
        fill="none" stroke="#E10E0E" stroke-width="28" stroke-linecap="round"/>
  
  <!-- CENTER DOT -->
  <circle cx="256" cy="256" r="10" fill="#8E2A00"/>
  
  <!-- TOP TURQUOISE RING -->
  <circle cx="256" cy="115" r="11" fill="none" stroke="#78D6C2" stroke-width="5"/>
  
  <!-- YELLOW NODE (animates on right arc) -->
  <g class="yellow-node">
    <animateMotion dur="4s" repeatCount="indefinite" keyPoints="0;1" keyTimes="0;1">
      <mpath href="#rightArcPath"/>
    </animateMotion>
    <circle r="9" fill="#FFE27A"/>
  </g>
  
  <!-- PEACH NODE (animates on left arc) -->
  <g class="peach-node">
    <animateMotion dur="4s" repeatCount="indefinite" keyPoints="0;1" keyTimes="0;1">
      <mpath href="#leftArcPath"/>
    </animateMotion>
    <circle r="9" fill="#FFB2A3"/>
  </g>
</svg>
