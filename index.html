<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <style>
      @keyframes slideYellow {
        0% { offset-distance: 0%; }
        100% { offset-distance: 100%; }
      }
      
      @keyframes slidePeach {
        0% { offset-distance: 100%; }
        100% { offset-distance: 0%; }
      }
      
      .yellow-node {
        animation: slideYellow 4s linear infinite;
      }
      
      .peach-node {
        animation: slidePeach 4s linear infinite;
      }
    </style>
    
    <!-- Right arc path for yellow node animation -->
    <path id="rightArcPath" d="M 419.1 256 A 163.1 163.1 0 0 1 256 419.1" fill="none"/>
    
    <!-- Left arc path for peach node animation -->
    <path id="leftArcPath" d="M 256 92.9 A 163.1 163.1 0 0 1 92.9 256" fill="none"/>
  </defs>
  
  <!-- TOP ARC (55°) from 302.5° to 57.5° -->
  <path d="M 199.5 110.3 A 163.1 163.1 0 0 1 312.5 110.3"
        fill="none" stroke="#E10E0E" stroke-width="28" stroke-linecap="round"/>
  
  <!-- RIGHT ARC (70°) from 20° to 90° -->
  <path d="M 419.1 256 A 163.1 163.1 0 0 1 256 419.1"
        fill="none" stroke="#E10E0E" stroke-width="28" stroke-linecap="round"/>
  
  <!-- BOTTOM ARC (55°) from 122.5° to 237.5° -->
  <path d="M 312.5 401.7 A 163.1 163.1 0 0 1 199.5 401.7"
        fill="none" stroke="#E10E0E" stroke-width="28" stroke-linecap="round"/>
  
  <!-- LEFT ARC (70°) from 270° to 340° -->
  <path d="M 92.9 256 A 163.1 163.1 0 0 1 256 92.9"
        fill="none" stroke="#E10E0E" stroke-width="28" stroke-linecap="round"/>
  
  <!-- CENTER DOT -->
  <circle cx="256" cy="256" r="10" fill="#8E2A00"/>
  
  <!-- TOP TURQUOISE RING -->
  <circle cx="256" cy="95" r="11" fill="none" stroke="#78D6C2" stroke-width="5"/>
  
  <!-- YELLOW NODE (animates on right arc) -->
  <g class="yellow-node">
    <animateMotion dur="4s" repeatCount="indefinite">
      <mpath href="#rightArcPath"/>
    </animateMotion>
    <circle r="9" fill="#FFE27A"/>
  </g>
  
  <!-- PEACH NODE (animates on left arc) -->
  <g class="peach-node">
    <animateMotion dur="4s" repeatCount="indefinite">
      <mpath href="#leftArcPath"/>
    </animateMotion>
    <circle r="9" fill="#FFB2A3"/>
  </g>
</svg>
