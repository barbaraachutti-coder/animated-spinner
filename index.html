<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <style>
      @keyframes slideYellow {
        0% { offset-distance: 0%; }
        100% { offset-distance: 100%; }
      }
      
      @keyframes slidePeach {
        0% { offset-distance: 100%; }
        100% { offset-distance: 0%; }
      }
      
      .yellow-node {
        animation: slideYellow 4s linear infinite;
      }
      
      .peach-node {
        animation: slidePeach 4s linear infinite;
      }
    </style>
    
    <!-- Right arc path for yellow node animation -->
    <path id="rightArcPath" d="M 406 178 A 160 160 0 0 1 334 406" fill="none"/>
    
    <!-- Left arc path for peach node animation -->
    <path id="leftArcPath" d="M 178 406 A 160 160 0 0 1 106 178" fill="none"/>
  </defs>
  
  <!-- TOP ARC (55° span) -->
  <path d="M 175 145 A 160 160 0 0 1 337 145"
        fill="none" stroke="#E10E0E" stroke-width="28" stroke-linecap="round"/>
  
  <!-- RIGHT ARC (70° span) connects to top -->
  <path d="M 406 178 A 160 160 0 0 1 334 406"
        fill="none" stroke="#E10E0E" stroke-width="28" stroke-linecap="round"/>
  
  <!-- BOTTOM ARC (55° span) -->
  <path d="M 337 367 A 160 160 0 0 1 175 367"
        fill="none" stroke="#E10E0E" stroke-width="28" stroke-linecap="round"/>
  
  <!-- LEFT ARC (70° span) connects to top -->
  <path d="M 106 178 A 160 160 0 0 1 178 406"
        fill="none" stroke="#E10E0E" stroke-width="28" stroke-linecap="round"/>
  
  <!-- CENTER DOT -->
  <circle cx="256" cy="256" r="10" fill="#8E2A00"/>
  
  <!-- TOP TURQUOISE RING -->
  <circle cx="256" cy="105" r="12" fill="none" stroke="#78D6C2" stroke-width="5"/>
  
  <!-- YELLOW NODE (animates on right arc) -->
  <g class="yellow-node">
    <animateMotion dur="4s" repeatCount="indefinite">
      <mpath href="#rightArcPath"/>
    </animateMotion>
    <circle r="9" fill="#FFE27A"/>
  </g>
  
  <!-- PEACH NODE (animates on left arc) -->
  <g class="peach-node">
    <animateMotion dur="4s" repeatCount="indefinite">
      <mpath href="#leftArcPath"/>
    </animateMotion>
    <circle r="9" fill="#FFB2A3"/>
  </g>
</svg>
